# docker-compose.yml
services:
  ollama-ai:
    build:
      context: ./ollama_backend
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama_backend:/ollama_backend
    environment:
      - OLLAMA_MODELS=${OLLAMA_MODELS}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ../frontend
    ports:
      - "8080:8080"
    volumes:
      - ../frontend:/app
    environment:
      - NODE_ENV=production
    depends_on:
      - ollama-ai

volumes:
  ollama_data:
